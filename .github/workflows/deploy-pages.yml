name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist

          cp HTML/index.html dist/index.html
          cp -R CSS dist/CSS
          cp -R Assests dist/Assests

          perl -0pi -e 's#\.\./CSS/#./CSS/#g; s#\.\./Assests/#./Assests/#g' dist/index.html

          test -f dist/index.html
          test -f dist/CSS/style.css
          test -d dist/Assests

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
